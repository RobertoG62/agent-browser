<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Browser - Skill Recommender</title>

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#C9A84C',
            'gold-light': '#E8D48B',
            cream: '#FAFAFA',
            charcoal: '#1A1A1A',
            navy: '#0A1628',
          },
          fontFamily: {
            heebo: ['Heebo', 'sans-serif'],
            playfair: ['Playfair Display', 'serif'],
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-charcoal font-heebo text-cream min-h-screen">

  <!-- Hero Section -->
  <section id="hero" class="relative min-h-screen flex flex-col items-center justify-center px-4">
    <!-- Background gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-navy/80 via-charcoal to-charcoal"></div>

    <div class="relative z-10 w-full max-w-2xl text-center">
      <!-- Logo -->
      <h1 class="font-playfair text-5xl md:text-6xl font-bold tracking-wide mb-3">
        <span class="text-gold">Agent</span> <span class="text-cream">Browser</span>
      </h1>
      <p class="text-lg md:text-xl text-cream/70 mb-10">
        גלה את הסקיל המושלם לפרויקט שלך
      </p>

      <!-- Search Area -->
      <div class="glass-card p-6 rounded-2xl">
        <textarea
          id="searchInput"
          rows="3"
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-cream placeholder-cream/40 text-lg resize-none focus:outline-none focus:border-gold/50 focus:ring-1 focus:ring-gold/30 transition-all"
          placeholder="תאר את הפרויקט שלך... / Describe your project..."
        ></textarea>
        <button
          id="searchBtn"
          class="mt-4 w-full bg-gold hover:bg-gold-light text-charcoal font-semibold text-lg py-3 px-8 rounded-xl transition-all duration-300 hover:shadow-[0_0_30px_rgba(201,168,76,0.3)]"
        >
          מצא סקילים
        </button>
      </div>

      <!-- Quick Categories -->
      <div id="categories" class="mt-8 flex flex-wrap justify-center gap-3">
        <button class="category-pill" data-category="web-development">אתרים</button>
        <button class="category-pill" data-category="marketing">שיווק</button>
        <button class="category-pill" data-category="design">עיצוב</button>
        <button class="category-pill" data-category="presentation">מצגות</button>
        <button class="category-pill" data-category="audio-video">אודיו/וידאו</button>
        <button class="category-pill" data-category="communication">תקשורת</button>
        <button class="category-pill" data-category="development">פיתוח</button>
        <button class="category-pill" data-category="document">מסמכים</button>
        <button class="category-pill" data-category="gaming">משחקים</button>
        <button class="category-pill" data-category="research">מחקר</button>
        <button class="category-pill" data-category="education">חינוך</button>
        <button class="category-pill" data-category="productivity">פרודוקטיביות</button>
        <button class="category-pill" data-category="automation">אוטומציה</button>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce opacity-40">
      <svg class="w-6 h-6 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
      </svg>
    </div>
  </section>

  <!-- Results Section -->
  <section id="results" class="px-4 py-16 max-w-6xl mx-auto hidden">
    <h2 id="resultsTitle" class="font-playfair text-3xl text-center text-gold mb-2"></h2>
    <p id="resultsSubtitle" class="text-center text-cream/50 mb-10"></p>
    <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <!-- Empty State -->
  <section id="emptyState" class="px-4 py-16 max-w-2xl mx-auto text-center hidden">
    <p class="text-cream/50 text-xl">לא נמצאו סקילים מתאימים. נסה לתאר את הפרויקט אחרת.</p>
  </section>

  <!-- Footer -->
  <footer class="text-center py-8 text-cream/30 text-sm border-t border-white/5">
    <p>
      Powered by
      <a href="https://skills.sh" target="_blank" class="text-gold/60 hover:text-gold transition-colors">skills.sh</a>
      &bull; Built with Claude Code
    </p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
